# Rime schema
# encoding: utf-8

schema:
  schema_id: triple_hangul
  name: 삼한
  version: '0.0'
  author:
    - 陳林(Chén Lín) <1chen0bryan@gmail.com>
  dependencies:
    - emoji_ko

switches:
  - name: ascii_mode
    reset: 0
    states: [ "글", "A" ]
  - name: full_shape
    states: [ "半", "全" ]
  - name: ascii_punct
    reset: 1
    states: [ 。，, ．， ]
  - name: hanja
    reset: 1
    states: [ "자", "字" ]
  - name: emoji
    reset: 1
    states: [ "자", "📏" ]

engine:
  processors:
    - lua_processor@*hangul.triple_hangul*proc
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - lua_translator@*hangul.triple_hangul*tran@hangul
    - lua_translator@*hangul.triple_hangul*tran@hanja
    - lua_translator@*hangul.triple_hangul*tran@emoji

speller:
  alphabet: "zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA~`!@#$%^&*()-_+=[]{}\\|:;\"',.<>/? "
  initials: "zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA"

translator:
  dictionary: hanja_hangul

hangul:
  quality: 100

hanja:
  dictionary: hanja_hangul
  option_name: hanja
  quality: 80

emoji:
  dictionary: emoji_ko
  option_name: emoji
  quality: 90

punctuator:
  import_preset: default

key_binder:
  import_preset: default
  bindings:
    # disabling paging with period and comma
    - { when: has_menu, accept: period, send: period}
    - { when: has_menu, accept: comma, send: comma}
    - { when: has_menu, accept: Escape, toggle: emoji}
    - { when: has_menu, accept: Shift+Escape, toggle: hanja}

editor:
  bindings:
    Return: confirm

recognizer:
  import_preset: default
